<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Copa Figurinhas</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container center">
  <div class="card admin-login-card">
    <div class="panini-logo">⚽ Copa Figurinhas 2026</div>
    <h2>Painel do Organizador</h2>
    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Senha do organizador" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>
    <p class="hint">Na primeira vez, a senha digitada se tornará a senha permanente.</p>
  </div>
</div>
</body>
</html>
