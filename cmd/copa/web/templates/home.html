<!DOCTYPE html>

<head>

<title>Copa Figurinhas 2026</title>

</head>
<body>
<div class="container center">
  <div class="card confirm-card">
    <div class="panini-logo">⚽ Copa Figurinhas 2026</div>
    <h2>Bem-vindo!</h2>
    <p class="confirm-question">
      Para entrar no jogo, <strong>escaneie o QR code</strong> da sua figurinha

    <p class="hint">
      Depois de entrar, é só escanear as figurinhas dos outros convidados para
      completar seu álbum. 📒
    </p>
  </div>
</div>
