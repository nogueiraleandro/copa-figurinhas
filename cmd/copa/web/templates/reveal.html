<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova figurinha! - Copa Figurinhas 2026</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="reveal-body">
<div class="reveal-container">
  <div class="reveal-card" id="revealCard">
    <div class="reveal-shine"></div>
    <div class="reveal-badge">NOVA FIGURINHA!</div>
    {{if .Photo}}
    <img src="{{.Photo}}" alt="{{.Name}}" class="reveal-photo">
    {{else}}
    <div class="reveal-initials">{{.Initial}}</div>
    {{end}}
    <div class="reveal-name">{{.Name}}</div>
    {{if .Complete}}
    <div class="reveal-complete">🏆 ÁLBUM COMPLETO!</div>
    {{end}}
  </div>
  <div class="reveal-actions">
    <a href="/album" class="btn btn-primary btn-lg">Ver meu álbum</a>
  </div>
</div>
<script>
var isComplete = {{if .Complete}}true{{else}}false{{end}};

// Trigger card stamp animation after load, then fire mascot celebrations
window.addEventListener('load', function() {
  var card = document.getElementById('revealCard');
  // Use stamp keyframe (squash & stretch)
  card.classList.add('stamp');
  // Also keep legacy .animate for existing CSS transition baseline
  card.classList.add('animate');

  // Mascot & confetti fire after stamp lands (~650ms)
  setTimeout(function() {
    if (isComplete) {
      if (typeof trophyBurst === 'function') trophyBurst();
      if (typeof mascotPlay === 'function') mascotPlay('complete');
    } else {
      if (typeof confettiBurst === 'function') confettiBurst();
      if (typeof mascotPlay === 'function') mascotPlay('collect');
    }
  }, 700);

  // Auto-redirect to album after 5 seconds (extended for animations)
  setTimeout(function() {
    window.location.href = '/album';
  }, 5000);
});
</script>
<script src="/static/mascote.js"></script>
</body>
</html>
